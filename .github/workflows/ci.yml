name: CI

on:
  push:
    branches: [main, "anvil/*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup MinGW
        run: |
          if (Test-Path "C:\mingw64\bin\gcc.exe") {
            echo "C:\mingw64\bin" | Out-File -Append $env:GITHUB_PATH
            Write-Host "Using pre-installed MinGW"
          } else {
            choco install mingw -y --no-progress
            echo "C:\ProgramData\mingw64\mingw64\bin" | Out-File -Append $env:GITHUB_PATH
          }

      - name: Download dependencies
        env:
          CGO_ENABLED: "1"
        run: go mod download

      - name: Generate sherpa-onnx import libraries
        run: |
          $modCache = go env GOMODCACHE
          $ver = (Select-String 'sherpa-onnx-go-windows (v[^ ]+)' go.sum).Matches[0].Groups[1].Value
          $libDir = "$modCache\github.com\k2-fsa\sherpa-onnx-go-windows@$ver\lib\x86_64-pc-windows-gnu"
          if (!(Test-Path $libDir)) { throw "Library directory not found: $libDir" }
          # Ensure runtime DLLs are discoverable for go test/go run binaries.
          $libDir | Out-File -Append $env:GITHUB_PATH
          Get-ChildItem $libDir -File | ForEach-Object { $_.Attributes = 'Normal' }
          Copy-Item "build\sherpa-onnx\onnxruntime.def" $libDir
          Copy-Item "build\sherpa-onnx\sherpa-onnx-c-api.def" $libDir
          Push-Location $libDir
          dlltool -d onnxruntime.def -l libonnxruntime.a -k
          dlltool -d sherpa-onnx-c-api.def -l libsherpa-onnx-c-api.a -k
          Pop-Location
          Write-Host "Import libraries generated from .def files"

      - name: Generate Windows resources
        run: |
          go install github.com/tc-hib/go-winres@latest
          go-winres make

      - name: Vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -count=1 ./...

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w -H windowsgui" -o whispaste.exe .

      - name: Check binary exists
        run: |
          if (!(Test-Path whispaste.exe)) { throw "Build failed: whispaste.exe not found" }
          $size = (Get-Item whispaste.exe).Length / 1MB
          Write-Host "Binary size: $([math]::Round($size, 2)) MB"

      - name: Secret scan
        shell: bash
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn --include='*.go' --include='*.html' --include='*.json' --include='*.md' \
            -E '(sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36}|password\s*=\s*"[^"]+")' \
            --exclude-dir=.git . ; then
            echo "::error::Potential secrets detected in source files!"
            exit 1
          fi
          echo "No secrets found ✓"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whispaste-exe
          path: whispaste.exe
          retention-days: 14
