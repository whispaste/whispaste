name: Branch Hygiene

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only report branches that would be deleted"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: branch-hygiene-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prune-remote-branches:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete non-main branches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const dryRun = ${{ inputs.dry_run || false }};

            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            const deleted = [];
            const skipped = [];
            const failed = [];

            for (const branch of branches) {
              const name = branch.name;
              if (name === defaultBranch) {
                skipped.push(name + " (default)");
                continue;
              }

              if (branch.protected) {
                skipped.push(name + " (protected)");
                continue;
              }

              if (dryRun) {
                skipped.push(name + " (dry-run)");
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${name}`,
                });
                deleted.push(name);
              } catch (err) {
                failed.push(`${name}: ${err.message}`);
              }
            }

            core.summary
              .addHeading("Branch Hygiene")
              .addRaw(`Default branch: ${defaultBranch}\n\n`)
              .addRaw(`Deleted (${deleted.length}): ${deleted.join(", ") || "none"}\n\n`)
              .addRaw(`Skipped (${skipped.length}): ${skipped.join(", ") || "none"}\n\n`)
              .addRaw(`Failed (${failed.length}): ${failed.join(" | ") || "none"}\n`)
              .write();

            if (failed.length > 0) {
              core.setFailed(`Failed to delete ${failed.length} branch(es)`);
            }
