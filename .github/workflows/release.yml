name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install MinGW
        run: choco install mingw -y --no-progress

      - name: Download dependencies
        env:
          CGO_ENABLED: "1"
        run: go mod download

      - name: Prepare sherpa-onnx libraries
        run: |
          $modCache = go env GOMODCACHE
          $ver = (Select-String 'sherpa-onnx-go-windows (v[^ ]+)' go.sum).Matches[0].Groups[1].Value
          $libDir = "$modCache\github.com\k2-fsa\sherpa-onnx-go-windows@$ver\lib\x86_64-pc-windows-gnu"
          Write-Host "Checking sherpa-onnx libs at: $libDir"
          if (Test-Path $libDir) {
            Get-ChildItem $libDir | Format-Table Name, Length
            # Remove read-only attribute that Go module cache sets
            Get-ChildItem $libDir -File | ForEach-Object { $_.Attributes = 'Normal' }
            Write-Host "Library files ready"
          } else {
            Write-Host "ERROR: Library directory not found"
            Write-Host "Extracting from module cache zip..."
            $zipDir = "$modCache\cache\download\github.com\k2-fsa\sherpa-onnx-go-windows\@v\$ver.zip"
            if (Test-Path $zipDir) {
              Write-Host "Found module zip, extracting..."
              Expand-Archive -Path $zipDir -DestinationPath "$modCache\github.com\k2-fsa\sherpa-onnx-go-windows@$ver" -Force
            } else {
              Write-Host "Module zip not found at: $zipDir"
              Get-ChildItem "$modCache\cache\download\github.com\k2-fsa" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
              exit 1
            }
          }

      - name: Generate Windows resources
        run: |
          go install github.com/tc-hib/go-winres@latest
          go-winres make

      - name: Determine version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $tag = $env:REF_NAME
          $ver = $tag -replace '^v', ''
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

      - name: Build
        env:
          CGO_ENABLED: "1"
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: >
          go build
          -ldflags="-s -w -H windowsgui -X main.AppVersion=$env:APP_VERSION"
          -o whispaste.exe .

      - name: Verify binary
        run: |
          if (!(Test-Path whispaste.exe)) { throw "Build failed: whispaste.exe not found" }
          $size = (Get-Item whispaste.exe).Length / 1MB
          Write-Host "Binary size: $([math]::Round($size, 2)) MB"

      - name: Copy runtime DLLs
        run: |
          $modCache = go env GOMODCACHE
          $ver = (Select-String 'sherpa-onnx-go-windows (v[^ ]+)' go.sum).Matches[0].Groups[1].Value
          $libDir = "$modCache\github.com\k2-fsa\sherpa-onnx-go-windows@$ver\lib\x86_64-pc-windows-gnu"
          Write-Host "Copying DLLs from $libDir"
          Copy-Item "$libDir\onnxruntime.dll" .
          Copy-Item "$libDir\sherpa-onnx-c-api.dll" .
          Copy-Item "$libDir\sherpa-onnx-cxx-api.dll" .
          Write-Host "Copied runtime DLLs"

      - name: Generate checksum
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 whispaste.exe).Hash.ToLower()
          "$hash  whispaste.exe" | Out-File -Encoding ascii -NoNewline whispaste.exe.sha256
          Write-Host "SHA256: $hash"

      - name: Package MSIX
        shell: pwsh
        run: |
          # Find MakeAppx.exe from Windows SDK
          $sdkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\MakeAppx.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $sdkPath) { Write-Host "::warning::MakeAppx.exe not found, skipping MSIX packaging"; exit 0 }
          $makeAppx = $sdkPath.FullName

          # Prepare MSIX staging directory
          $staging = "msix-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item whispaste.exe $staging\
          Copy-Item msix\AppxManifest.xml $staging\

          # Copy or create placeholder icons
          New-Item -ItemType Directory -Force -Path "$staging\Assets" | Out-Null
          if (Test-Path msix\Assets\*.png) {
            Copy-Item msix\Assets\*.png "$staging\Assets\"
          }

          # Update version in manifest
          $manifest = [xml](Get-Content "$staging\AppxManifest.xml")
          $manifest.Package.Identity.Version = "${{ steps.version.outputs.VERSION }}.0"
          $manifest.Save("$staging\AppxManifest.xml")

          # Create MSIX package
          & $makeAppx pack /d $staging /p whispaste.msix /o /nv
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::MSIX packaging failed"; exit 0 }
          Write-Host "MSIX package created: $((Get-Item whispaste.msix).Length / 1MB) MB"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            whispaste.exe
            whispaste.exe.sha256
            onnxruntime.dll
            sherpa-onnx-c-api.dll
            sherpa-onnx-cxx-api.dll
            whispaste.msix
