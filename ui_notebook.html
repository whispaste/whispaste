<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ── Reset & Base ────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Custom Properties ─────────────────────────────────── */
:root {
  --accent: #0891B2;
  --accent-hover: #0E7490;
  --accent-active: #155E75;
  --bg: #F2F2F7;
  --bg-card: #FFFFFF;
  --bg-hover: #F8F8FC;
  --bg-input: #FFFFFF;
  --border: #D1D1D6;
  --border-focus: var(--accent);
  --text: #1C1C1E;
  --text-secondary: #636366;
  --text-hint: #8E8E93;
  --success: #34C759;
  --error: #FF3B30;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --transition: 220ms cubic-bezier(.4, 0, .2, 1);
}
[data-theme="dark"] {
  --accent: #22D3EE;
  --accent-hover: #67E8F9;
  --accent-active: #06B6D4;
  --bg: #1C1C1E;
  --bg-card: #2C2C2E;
  --bg-hover: #3A3A3C;
  --bg-input: #1C1C1E;
  --border: #38383A;
  --border-focus: var(--accent);
  --text: #F2F2F7;
  --text-secondary: #AEAEB2;
  --text-hint: #636366;
  --success: #30D158;
  --error: #FF453A;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.5);
}

.icon {
  display: inline-block;
  width: 18px;
  height: 18px;
  vertical-align: middle;
  flex-shrink: 0;
}
.icon svg {
  width: 100%;
  height: 100%;
}

html,body{height:100%;overflow:hidden;font-family:var(--font);background:linear-gradient(160deg, var(--bg) 0%, color-mix(in srgb, var(--accent) 4%, var(--bg)) 50%, var(--bg) 100%);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;user-select:none}
body{display:flex;flex-direction:column}

/* ─── Top Bar ─── */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--bg-card);border-bottom:1px solid color-mix(in srgb, var(--accent) 15%, var(--border));-webkit-app-region:drag;flex-shrink:0}
.topbar-logo{display:flex;align-items:center;flex-shrink:0;-webkit-app-region:no-drag}
.topbar-logo .icon{color:var(--accent);width:24px;height:24px}
.topbar-logo .app-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px;margin-left:2px}
.search-box{flex:1;max-width:400px;position:relative;-webkit-app-region:no-drag;margin:0 auto}
.search-box input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text);font-size:13px;outline:none;transition:border-color var(--transition)}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text-hint)}
.search-box .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-hint);pointer-events:none}
.topbar-actions{margin-left:auto;display:flex;gap:8px;-webkit-app-region:no-drag}
.count-badge{font-size:11px;color:var(--text-hint);padding:4px 10px;background:var(--bg-hover);border-radius:12px}

/* ─── Layout ─── */
.main{display:flex;flex:1;overflow:hidden}

/* ─── Sidebar ─── */
.sidebar{width:180px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 0;overflow-y:auto}
.sidebar-section{padding:0 12px;margin-bottom:16px}
.sidebar-section-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-hint);margin-bottom:6px;padding:0 8px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all var(--transition)}
.sidebar-item:hover{background:var(--bg-hover);color:var(--text)}
.sidebar-item.active{background:color-mix(in srgb, var(--accent) 12%, transparent);color:var(--accent)}
.sidebar-item .icon{width:15px;height:15px;flex-shrink:0}
.sidebar-item .count{margin-left:auto;font-size:11px;color:var(--text-hint)}
.sidebar-item.active .count{color:var(--accent)}

/* ─── Entry List ─── */
.entries{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:6px}
.entries::-webkit-scrollbar{width:6px}
.entries::-webkit-scrollbar-track{background:transparent}
.entries::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.entries::-webkit-scrollbar-thumb:hover{background:var(--text-hint)}

.entry{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 16px;cursor:pointer;transition:all var(--transition);position:relative;box-shadow:var(--shadow-sm)}
.entry:hover{background:var(--bg-hover);box-shadow:var(--shadow-md)}
.entry.expanded{background:var(--bg-hover);border-color:var(--accent);box-shadow:var(--shadow-md)}
.entry.pinned::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.entry-header{display:flex;align-items:flex-start;gap:10px}
.entry-title{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-meta{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:11px;color:var(--text-hint)}
.entry-meta .tag{background:var(--bg-hover);padding:1px 6px;border-radius:3px;font-size:10px}
.entry-preview{margin-top:8px;font-size:12px;color:var(--text-secondary);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.entry-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity var(--transition)}
.entry:hover .entry-actions{opacity:1}
.entry.expanded .entry-actions{opacity:1}

.entry-full{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none}
.entry.expanded .entry-full{display:block}
.entry-full-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;padding:12px;background:var(--bg);border-radius:var(--radius-sm);user-select:text}

/* ─── Action Buttons ─── */
.btn-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text-hint);cursor:pointer;transition:all var(--transition)}
.btn-icon:hover{background:var(--bg-hover);color:var(--text)}
.btn-icon.copy:hover{color:var(--accent)}
.btn-icon.pin:hover,.btn-icon.pin.active{color:var(--accent)}
.btn-icon.delete:hover{color:var(--error);background:color-mix(in srgb, var(--error) 10%, transparent)}
.btn-icon .icon{width:15px;height:15px}

/* ─── Empty State ─── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;color:var(--text-hint)}
.empty-state .icon{width:48px;height:48px;color:var(--text-hint);margin-bottom:16px;opacity:.5}
.empty-state p{font-size:14px;line-height:1.6;max-width:300px}

/* ─── Toast ─── */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;background:var(--accent-hover);color:#fff;border-radius:var(--radius-sm);font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:1000}
.toast.show{opacity:1;transform:translateY(0)}

/* ─── Delete Confirm ─── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
.confirm-overlay.show{opacity:1;pointer-events:auto}
.confirm-dialog{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:24px;min-width:300px;box-shadow:var(--shadow-lg)}
.confirm-dialog h3{font-size:15px;margin-bottom:12px;color:var(--text)}
.confirm-dialog .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.confirm-dialog button{padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-hover);color:var(--text);cursor:pointer;font-size:13px;transition:all var(--transition)}
.confirm-dialog button:hover{background:color-mix(in srgb, var(--text) 8%, var(--bg-hover))}
.confirm-dialog button.danger{background:var(--error);border-color:var(--error);color:#fff}
.confirm-dialog button.danger:hover{opacity:.9}

.sort-select{-webkit-app-region:no-drag;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-size:12px;font-family:var(--font);outline:none;cursor:pointer}
.sort-select:focus{border-color:var(--accent)}

.entry-tags-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.tag-input-row{display:flex;align-items:center;gap:8px}
.tag-input-row .icon{width:14px;height:14px;color:var(--text-hint);flex-shrink:0}
.tag-input{flex:1;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.tag-input:focus{border-color:var(--accent)}

.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:all var(--transition);z-index:100}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.fab:active{transform:scale(0.95)}
.fab .icon{width:24px;height:24px}

@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-logo">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
    <span class="app-name">WhisPaste</span>
  </div>
  <div class="search-box">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" data-i18n-placeholder="notebook.search" placeholder="Search…">
  </div>
  <span class="count-badge" id="countBadge">0</span>
  <div class="topbar-actions">
    <button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="Toggle Theme">
      <svg class="icon" id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>
    <button class="btn-icon" id="langToggle" onclick="toggleLang()" title="Language">
      <span style="font-size:12px;font-weight:600;letter-spacing:0.5px" id="langLabel">EN</span>
    </button>
    <button class="btn-icon" onclick="openLogFile()" title="View Log">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
    </button>
    <button class="btn-icon" onclick="openSettings()" title="Settings">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
</div>

<!-- Main Layout -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-title" data-i18n="notebook.sort">Sort</div>
      <select class="sort-select" id="sortSelect" onchange="changeSort(this.value)" style="margin:0 12px 4px;width:calc(100% - 24px)">
        <option value="newest" data-i18n="notebook.sort_newest">Newest first</option>
        <option value="oldest" data-i18n="notebook.sort_oldest">Oldest first</option>
        <option value="alpha" data-i18n="notebook.sort_alpha">A–Z</option>
        <option value="duration" data-i18n="notebook.sort_duration">Duration</option>
      </select>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Filter</div>
      <div class="sidebar-item active" data-filter="all">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        <span data-i18n="notebook.all">All</span>
        <span class="count" id="countAll">0</span>
      </div>
      <div class="sidebar-item" data-filter="pinned">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
        <span data-i18n="notebook.pinned">Pinned</span>
        <span class="count" id="countPinned">0</span>
      </div>
      <div class="sidebar-item" data-filter="today">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span data-i18n="notebook.today">Today</span>
        <span class="count" id="countToday">0</span>
      </div>
      <div class="sidebar-item" data-filter="week">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        <span data-i18n="notebook.this_week">This Week</span>
        <span class="count" id="countWeek">0</span>
      </div>
      <div class="sidebar-item" data-filter="older">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
        <span data-i18n="notebook.older">Older</span>
        <span class="count" id="countOlder">0</span>
      </div>
    </div>
    <div class="sidebar-section" id="categoriesSection" style="display:none">
      <div class="sidebar-section-title">Categories</div>
      <div id="categoryList"></div>
    </div>
  </div>

  <!-- Entries -->
  <div class="entries" id="entriesList"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- FAB Record Button -->
<button class="fab" id="captureBtn" onclick="startCapture()" title="Record">
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
</button>

<!-- Delete Confirmation -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <h3 id="confirmText" data-i18n="notebook.confirm_delete">Delete this entry?</h3>
    <div class="actions">
      <button id="confirmCancel">Cancel</button>
      <button class="danger" id="confirmDelete" data-i18n="notebook.delete">Delete</button>
    </div>
  </div>
</div>

<script>
(function(){
  // Use theme from config (injected as window._theme)
  const theme = window._theme || 'system';
  let effective = theme;
  if (theme === 'system') effective = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  if (effective === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
})();
(function(){
  let entries = [];
  let tr = {};
  let activeFilter = 'all';
  let searchQuery = '';
  let currentSort = 'newest';
  let expandedId = null;
  let pendingDeleteId = null;

  // Lucide SVG icon fragments
  const icons = {
    copy: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>',
    pin: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>',
    trash: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>',
    microphone: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>',
    tag: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>'
  };

  async function init() {
    try {
      const trJson = await getTranslations();
      tr = JSON.parse(trJson);
    } catch(e) { console.error('l10n error', e); }
    applyTranslations();
    // Apply theme and lang from config
    applyTheme(_currentTheme);
    updateLangLabel();
    await loadEntries();
    setupListeners();
    windowReady();
  }

  function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (tr[key]) el.textContent = tr[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (tr[key]) el.placeholder = tr[key];
    });
  }

  async function loadEntries() {
    try {
      const json = await getEntries();
      entries = JSON.parse(json);
    } catch(e) { entries = []; }
    render();
  }

  function isToday(ts) {
    const d = new Date(ts), now = new Date();
    return d.toDateString() === now.toDateString();
  }

  function isThisWeek(ts) {
    const d = new Date(ts), now = new Date();
    const weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
    return d >= weekAgo;
  }

  function matchesFilter(e) {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'pinned') return e.pinned;
    if (activeFilter === 'today') return isToday(e.timestamp);
    if (activeFilter === 'week') return isThisWeek(e.timestamp);
    if (activeFilter === 'older') return !isThisWeek(e.timestamp);
    if (activeFilter.startsWith('cat:')) return e.category === activeFilter.slice(4);
    return true;
  }

  function matchesSearch(e) {
    if (!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return (e.title||'').toLowerCase().includes(q) || (e.text||'').toLowerCase().includes(q);
  }

  function getFiltered() {
    let list = entries.filter(e => matchesFilter(e) && matchesSearch(e));
    list.sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      switch (currentSort) {
        case 'oldest': return new Date(a.timestamp) - new Date(b.timestamp);
        case 'alpha': return (a.title||a.text).localeCompare(b.title||b.text);
        case 'duration': return (b.duration_sec||0) - (a.duration_sec||0);
        default: return new Date(b.timestamp) - new Date(a.timestamp);
      }
    });
    return list;
  }

  function changeSort(val) {
    currentSort = val;
    render();
  }

  function updateCounts() {
    document.getElementById('countAll').textContent = entries.length;
    document.getElementById('countPinned').textContent = entries.filter(e => e.pinned).length;
    document.getElementById('countToday').textContent = entries.filter(e => isToday(e.timestamp)).length;
    document.getElementById('countWeek').textContent = entries.filter(e => isThisWeek(e.timestamp)).length;
    document.getElementById('countOlder').textContent = entries.filter(e => !isThisWeek(e.timestamp)).length;

    const filtered = getFiltered();
    document.getElementById('countBadge').textContent = filtered.length;

    // Categories
    const cats = {};
    entries.forEach(e => { if(e.category) cats[e.category] = (cats[e.category]||0) + 1; });
    const catSection = document.getElementById('categoriesSection');
    const catList = document.getElementById('categoryList');
    if (Object.keys(cats).length > 0) {
      catSection.style.display = '';
      catList.innerHTML = Object.entries(cats).map(([name, count]) => `
        <div class="sidebar-item${activeFilter === 'cat:'+esc(name) ? ' active' : ''}" data-filter="cat:${esc(name)}">
          ${icons.tag}
          <span>${esc(name)}</span>
          <span class="count">${count}</span>
        </div>
      `).join('');
      catList.querySelectorAll('.sidebar-item').forEach(el => {
        el.addEventListener('click', () => setFilter(el.dataset.filter));
      });
    } else {
      catSection.style.display = 'none';
    }
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }
    return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function formatDuration(sec) {
    if (!sec || sec < 1) return '';
    if (sec < 60) return Math.round(sec) + 's';
    return Math.floor(sec/60) + 'm ' + Math.round(sec%60) + 's';
  }

  function render() {
    const list = document.getElementById('entriesList');
    const filtered = getFiltered();
    updateCounts();

    if (entries.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          ${icons.microphone}
          <p>${tr['notebook.empty'] || 'No entries yet.'}</p>
        </div>`;
      return;
    }

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <p>${tr['notebook.no_results'] || 'No matching entries.'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(e => `
      <div class="entry${e.pinned ? ' pinned' : ''}${expandedId === e.id ? ' expanded' : ''}" data-id="${e.id}">
        <div class="entry-header">
          <div style="flex:1;min-width:0">
            <div class="entry-title">${esc(e.title || e.text.substring(0,60))}</div>
            <div class="entry-meta">
              <span>${formatTime(e.timestamp)}</span>
              ${e.duration_sec ? '<span>' + formatDuration(e.duration_sec) + '</span>' : ''}
              ${e.language ? '<span>' + e.language.toUpperCase() + '</span>' : ''}
              ${e.category ? '<span class="tag">' + esc(e.category) + '</span>' : ''}
            </div>
          </div>
          <div class="entry-actions">
            <button class="btn-icon copy" title="${tr['notebook.copy']||'Copy'}" data-action="copy" data-id="${e.id}">${icons.copy}</button>
            <button class="btn-icon pin${e.pinned ? ' active' : ''}" title="${e.pinned ? (tr['notebook.unpin']||'Unpin') : (tr['notebook.pin']||'Pin')}" data-action="pin" data-id="${e.id}">${icons.pin}</button>
            <button class="btn-icon delete" title="${tr['notebook.delete']||'Delete'}" data-action="delete" data-id="${e.id}">${icons.trash}</button>
          </div>
        </div>
        <div class="entry-preview">${esc(e.text)}</div>
        <div class="entry-full">
          <div class="entry-full-text">${esc(e.text)}</div>
          <div class="entry-tags-section">
            <div class="tag-input-row">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>
              <input type="text" class="tag-input" placeholder="${tr['notebook.add_tag'] || 'Add tag…'}" value="${esc(e.category || '')}" data-id="${e.id}" onchange="updateTag(this)" />
            </div>
          </div>
        </div>
      </div>
    `).join('');

    // Bind events
    list.querySelectorAll('.entry').forEach(el => {
      el.addEventListener('click', (ev) => {
        if (ev.target.closest('[data-action]')) return;
        const id = el.dataset.id;
        expandedId = expandedId === id ? null : id;
        render();
      });
    });

    list.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        if (action === 'copy') doCopy(id);
        else if (action === 'pin') doPin(id);
        else if (action === 'delete') confirmDelete(id);
      });
    });
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  async function doCopy(id) {
    await copyEntry(id);
    showToast(tr['notebook.copied'] || 'Copied!');
  }

  async function doPin(id) {
    await pinEntry(id);
    await loadEntries();
  }

  function confirmDelete(id) {
    pendingDeleteId = id;
    document.getElementById('confirmOverlay').classList.add('show');
  }

  async function doDelete() {
    if (!pendingDeleteId) return;
    await deleteEntry(pendingDeleteId);
    if (expandedId === pendingDeleteId) expandedId = null;
    pendingDeleteId = null;
    document.getElementById('confirmOverlay').classList.remove('show');
    await loadEntries();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === f);
    });
    render();
  }

  function setupListeners() {
    document.getElementById('searchInput').addEventListener('input', (ev) => {
      searchQuery = ev.target.value;
      render();
    });

    document.querySelectorAll('.sidebar .sidebar-item').forEach(el => {
      el.addEventListener('click', () => setFilter(el.dataset.filter));
    });

    document.getElementById('confirmCancel').addEventListener('click', () => {
      pendingDeleteId = null;
      document.getElementById('confirmOverlay').classList.remove('show');
    });

    document.getElementById('confirmDelete').addEventListener('click', doDelete);

    // Keyboard shortcuts
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape') {
        if (document.getElementById('confirmOverlay').classList.contains('show')) {
          pendingDeleteId = null;
          document.getElementById('confirmOverlay').classList.remove('show');
        } else if (expandedId) {
          expandedId = null;
          render();
        }
      }
      // Ctrl+F → focus search
      if ((ev.ctrlKey || ev.metaKey) && ev.key === 'f') {
        ev.preventDefault();
        document.getElementById('searchInput').focus();
      }
    });
  }

  window.changeSort = changeSort;
  window.openSettings = async function() {
    try { await openSettingsBinding(); } catch(e) { console.error('openSettings error', e); }
  };

  // Theme toggle: cycles system → dark → light
  let _currentTheme = window._theme || 'system';
  function resolveTheme(t) {
    if (t === 'system') return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    return t;
  }
  function applyTheme(t) {
    const eff = resolveTheme(t);
    if (eff === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    // Update icon: sun for dark (click → light), moon for light (click → dark)
    const iconEl = document.getElementById('themeIcon');
    if (iconEl) {
      if (eff === 'dark') {
        iconEl.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';
      } else {
        iconEl.innerHTML = '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
      }
    }
  }
  window.toggleTheme = function() {
    if (_currentTheme === 'system') _currentTheme = 'dark';
    else if (_currentTheme === 'dark') _currentTheme = 'light';
    else _currentTheme = 'system';
    applyTheme(_currentTheme);
    try { setTheme(_currentTheme); } catch(e) {}
  };
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (_currentTheme === 'system') applyTheme('system');
  });

  // Language toggle
  let _currentLang = window._lang || 'en';
  function updateLangLabel() {
    const el = document.getElementById('langLabel');
    if (el) el.textContent = _currentLang.toUpperCase();
  }
  window.toggleLang = async function() {
    _currentLang = _currentLang === 'en' ? 'de' : 'en';
    updateLangLabel();
    try { await setUILanguage(_currentLang); } catch(e) {}
    // Reload translations
    try {
      const trJson = await getTranslations();
      tr = JSON.parse(trJson);
    } catch(e) {}
    applyTranslations();
  };

  window.updateTag = async function(input) {
    const id = input.dataset.id;
    const tag = input.value.trim();
    const entry = entries.find(e => e.id === id);
    if (entry) {
      await updateEntry(id, entry.title || '', tag);
      await loadEntries();
      showToast(tr['notebook.tag_updated'] || 'Tag updated');
    }
  };

  init();
})();
</script>
</body>
</html>
